# Split PDF to MD - Configuration Example
#
# Place this file as config.yaml in the project root.
# CLI arguments take precedence over these values.
# Environment variables (ANTHROPIC_API_KEY) take precedence over this file.

# LLM settings
model: claude-sonnet-4-20250514
max_tokens: 2000

# PDF scanning
toc_scan_pages: 30

# Conversion engine: "auto", "marker", or "pymupdf4llm"
converter: auto

# Post-processing (token optimization)
no_postprocess: false
